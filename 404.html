<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KW CAP Lab</title>
  <!--
    예전 GitHub Pages 경로(/Lab_hompage/...)로 홈 화면에 추가된 기기는
    manifest.json을 고쳐도 그 경로가 그대로 남아있어 이 페이지로 들어올 수 있다.
    바로 홈으로 보내서 "첫 화면 404 → 새로고침해야 정상" 경험을 없앤다.
  -->
  <meta http-equiv="refresh" content="0; url=/">
  <script>location.replace('/');</script>
</head>
<body>
  <p>페이지를 찾을 수 없어 홈으로 이동합니다. 자동으로 이동하지 않으면 <a href="/">여기를 눌러주세요</a>.</p>
</body>
</html>
